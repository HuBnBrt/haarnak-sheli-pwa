name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:             pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # config.js is git-ignored (contains private GAS URL).
      # On GitHub Pages the device must already have config.js cached locally,
      # OR the parent sets up the device manually from the config.example.js.
      # The app shows a clear error if config.js is missing.

      - name: Upload frontend files
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy everything except gas/ and docs/ — those are dev-only
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
